<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Planner - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>MILK PLANNER</h1>
        <div class="menu-bar">
            <button class="menu-btn">☰</button>
            <div class="menu-content">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Profile</a></li>
                    <li><a href="#">Milk Details</a></li>
                    <li><a href="#">Generate Bill</a></li>
                    <li><a href="#">Logout</a></li>
                </ul>
            </div>
        </div>
        <div class="toggle-btn">
            <button id="autoAddMilkBtn">RESUME</button>
        </div>
    </div>

    <div class="welcome-section">
        <h2>Welcome, <span id="userName">[User's Name]</span>!</h2>
        <p>Milk Price: <span id="milkPrice"></span> Rs. per kg</p>
        <p>Daily Milk Requirement: <span id="dailyMilkReq"></span> kg</p>
    </div>

    <div class="calendar">
        <!-- Calendar will be generated dynamically here -->
    </div>

    <div class="update-milk-details">
        <label for="milkPerKg">Milk per kg for <span id="selectedDate"></span>:</label>
        <input type="number" id="milkPerKg" value="0" step="0.5">
        <button id="updateBtn">Update</button>
        <button id="resetBtn">Reset</button>
    </div>

    <script src="home.js"></script>
</body>
</html>
